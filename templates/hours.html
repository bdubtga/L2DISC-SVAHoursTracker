<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="./js/tailwind.js"></script>
  </head>
  <body class="grid grid-cols-2">
    <!-- entries list-->
    <div
      class="flex flex-col m-8 mr-4 bg-white shadow-md overflow-y-scroll"
      style="height: calc(100vh - 4rem)"
    >
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th
              class="px-4 py-3 text-left text-xs font-medium text-gray-500 tracking-wider max-w-[8rem] w-[8rem]"
              style="max-width: 8rem; width: 8rem"
            >
              Activity
            </th>
            <th
              class="px-4 py-3 text-left text-xs font-medium text-gray-500 tracking-wider max-w-[6rem] w-[6rem]"
              style="max-width: 6rem; width: 6rem"
            >
              Description
            </th>
            <th
              class="px-6 py-3 text-left text-xs font-medium text-gray-500 tracking-wider"
            >
              Date
            </th>
            <th
              class="px-6 py-3 text-left text-xs font-medium text-gray-500 tracking-wider"
            >
              Hours
            </th>
            <th class="px-6 py-3"></th>
          </tr>
        </thead>
        <tbody>
          <script>
            fetch("/entries")
              .then((response) => response.json())
              .then((entries) => {
                const tbody = document.querySelector("tbody");
                tbody.innerHTML = "";
                entries.forEach((entry) => {
                  const tr = document.createElement("tr");
                  tr.innerHTML = `
                    <td class="px-4 py-4 whitespace-nowrap max-w-[8rem] w-[8rem] truncate">
                      ${entry.activity}
                    </td>
                    <td class="px-4 py-4 whitespace-nowrap max-w-xs w-xs truncate">
                      ${entry.description}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">${entry.date}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${entry.hours}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                      <button
                        class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-1 px-3 rounded"
                        onclick="edit('${entry.id}')"
                      >
                        Edit
                      </button>
                    </td>
                  `;
                  tbody.appendChild(tr);
                });
              })
              .catch((error) =>
                console.error("Error fetching entries:", error)
              );
          </script>
        </tbody>
      </table>
    </div>
    <div class="flex flex-col gap-8 p-8 pl-4">
      <!-- new entry -->
      <div class="bg-white shadow-md">
        <form class="flex flex-col p-6" action="/NewEntry" method="post">
          <div class="flex flex-row gap-4 mb-4">
            <div class="flex flex-col flex-1">
              <label class="mb-2 font-semibold text-gray-700" for="activity"
                >Activity Name</label
              >
              <input
                class="p-2 border border-gray-300 rounded w-full"
                type="text"
                id="activity"
                name="activity"
                required
              />
            </div>
            <div class="flex flex-col">
              <label class="mb-2 font-semibold text-gray-700" for="start"
                >Start Date & Time</label
              >
              <input
                class="p-2 border border-gray-300 rounded"
                type="datetime-local"
                id="start"
                name="start"
                required
              />
            </div>
            <div class="flex flex-col">
              <label class="mb-2 font-semibold text-gray-700" for="end"
                >End Date & Time</label
              >
              <input
                class="p-2 border border-gray-300 rounded"
                type="datetime-local"
                id="end"
                name="end"
                required
              />
            </div>
          </div>

          <label class="mb-2 font-semibold text-gray-700" for="description"
            >Activity Description</label
          >
          <textarea
            class="mb-4 p-2 border border-gray-300 rounded"
            id="description"
            name="description"
            rows="3"
            required
          ></textarea>

          <button
            type="submit"
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mt-2"
          >
            Submit
          </button>
        </form>
      </div>
      <!-- summary / progress -->
      <div
        id="summaryPanel"
        class="bg-white w-full rounded shadow-md p-6 text-gray-900 flex flex-col gap-4"
        data-member-icon="./img/1.-Member-Badge.png"
        data-bronze-icon="./img/2.-Bronze-Badge.png"
        data-silver-icon="./img/3.-Silver-Badge.png"
        data-gold-icon="./img/4.-Gold-Badge.png"
      >
        <div class="flex items-baseline justify-between">
          <h2 class="text-base font-semibold">Hours Summary</h2>
        </div>

        <div>
          <div class="flex items-end justify-between mb-2">
            <div class="flex items-end gap-3">
              <div id="totalHours" class="text-3xl font-bold leading-none">
                0
              </div>
              <div id="nextMilestone" class="text-xs text-gray-500 mb-1"></div>
            </div>
            <div id="goalHours" class="text-3xl font-bold leading-none">
              500
            </div>
          </div>
          <div class="relative h-2 rounded-full bg-gray-200 overflow-hidden">
            <div
              id="progressFill"
              class="absolute left-0 top-0 h-full bg-blue-500 transition-[width] duration-500"
              style="width: 0%"
            ></div>
          </div>
        </div>
        <div>
          <h3 class="text-sm font-semibold mb-2">Achievements</h3>
          <ul id="achievementsList" class="grid grid-cols-2 gap-4"></ul>
        </div>
      </div>
    </div>
  </body>
  <script>
    function edit(id) {
      window.location.href = `./edit.html?id=${id}`;
    }
  </script>
  <script>
    var maximumGoalHours = 500;

    var achievementThresholds = [
      { key: "member", label: "Member", hours: 5 },
      { key: "bronze", label: "Bronze", hours: 32 },
      { key: "silver", label: "Silver", hours: 250 },
      { key: "gold", label: "Gold", hours: 500 },
    ];

    // Predefined icons instead of calculating every time
    var iconPaths = {
      member: "/img/member.png",
      bronze: "/img/bronze.png",
      silver: "/img/silver.png",
      gold: "/img/gold.png",
    };

    var totalHoursElement = document.getElementById("totalHours");
    var nextMilestoneElement = document.getElementById("nextMilestone");
    var goalHoursElement = document.getElementById("goalHours");
    var progressFillElement = document.getElementById("progressFill");
    var achievementsListElement = document.getElementById("achievementsList");

    function formatHoursToText(hoursValue) {
      if (hoursValue % 1 === 0) {
        return hoursValue.toString();
      } else {
        return hoursValue.toFixed(2);
      }
    }

    function renderAchievementList(totalHours) {
      achievementsListElement.innerHTML = "";
      for (var i = 0; i < achievementThresholds.length; i++) {
        var currentThreshold = achievementThresholds[i];
        var hasBeenAchieved = totalHours >= currentThreshold.hours;

        var listItem = document.createElement("li");
        listItem.className = hasBeenAchieved
          ? "flex items-center gap-3 p-2 rounded border border-emerald-300"
          : "flex items-center gap-3 p-2 rounded border border-gray-200 opacity-70";

        var iconWrapper = document.createElement("div");
        iconWrapper.className =
          "relative w-8 h-8 rounded-full flex items-center justify-center bg-gray-100 ring-1 ring-gray-200 overflow-hidden";

        var iconImage = document.createElement("img");
        iconImage.alt = currentThreshold.label + " icon";
        iconImage.className = "w-full h-full object-contain object-center";

        if (iconPaths[currentThreshold.key]) {
          iconImage.src = iconPaths[currentThreshold.key];
          iconImage.onerror = function () {
            this.style.display = "none";
          };
        }

        iconWrapper.appendChild(iconImage);

        var textWrapper = document.createElement("div");
        var titleElement = document.createElement("div");
        titleElement.className = "font-medium";
        titleElement.textContent = currentThreshold.label;
        var subtitleElement = document.createElement("div");
        subtitleElement.className = "text-xs text-gray-500";
        subtitleElement.textContent = currentThreshold.hours + " hours";

        textWrapper.appendChild(titleElement);
        textWrapper.appendChild(subtitleElement);

        listItem.appendChild(iconWrapper);
        listItem.appendChild(textWrapper);

        if (!hasBeenAchieved) {
          var statusElement = document.createElement("div");
          statusElement.className = "ml-auto text-xs text-gray-600";
          statusElement.textContent =
            Math.max(0, currentThreshold.hours - totalHours) + "h to go";
          listItem.appendChild(statusElement);
        }

        achievementsListElement.appendChild(listItem);
      }
    }

    function updateProgress(totalHours) {
      totalHoursElement.textContent = formatHoursToText(totalHours);
      if (goalHoursElement) {
        goalHoursElement.textContent = formatHoursToText(maximumGoalHours);
      }

      var progressPercentage = Math.min(
        100,
        (Math.min(totalHours, maximumGoalHours) / maximumGoalHours) * 100
      );
      progressFillElement.style.width = progressPercentage + "%";

      var nextThreshold = null;
      for (var j = 0; j < achievementThresholds.length; j++) {
        if (totalHours < achievementThresholds[j].hours) {
          nextThreshold = achievementThresholds[j];
          break;
        }
      }

      if (nextThreshold) {
        var remainingHours = Math.max(0, nextThreshold.hours - totalHours);
        nextMilestoneElement.textContent =
          formatHoursToText(remainingHours) +
          " hour" +
          (remainingHours === 1 ? "" : "s") +
          " to " +
          nextThreshold.label;
      } else {
        nextMilestoneElement.textContent = "All achievements reached";
      }

      renderAchievementList(totalHours);
    }

    fetch("/entries")
      .then(function (response) {
        return response.json();
      })
      .then(function (entries) {
        var total = 0;
        for (var k = 0; k < entries.length; k++) {
          var hoursValue = parseFloat(entries[k].hours);
          if (!isNaN(hoursValue)) {
            total += hoursValue;
          }
        }
        updateProgress(total);
      })
      .catch(function (error) {
        console.error("Error fetching entries:", error);
      });
  </script>
</html>
